<svg viewBox="0 0 480 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Feastpot logo">
  <title>Feastpot - African and Caribbean food delivered</title>
  <defs>
    <linearGradient id="fpFlameRed" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#B5361A"/>
      <stop offset="1" stop-color="#E8520A"/>
    </linearGradient>
    <linearGradient id="fpFlameYellow" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#E89A1F"/>
      <stop offset="1" stop-color="#F5C84A"/>
    </linearGradient>
    <linearGradient id="fpFlameGreen" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#2F6B36"/>
      <stop offset="1" stop-color="#5BA341"/>
    </linearGradient>
    <linearGradient id="fpPotBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C68955"/>
      <stop offset="0.45" stop-color="#A06A38"/>
      <stop offset="1" stop-color="#7A4B28"/>
    </linearGradient>
    <radialGradient id="fpPotShine" cx="0.32" cy="0.35" r="0.55">
      <stop offset="0" stop-color="#E8B07A" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#A06A38" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ============ FLAME-STYLE STEAM (behind ingredients) ============ -->
  <!-- Red/orange flame on the left -->
  <path d="M210 215
           Q175 175 188 130
           Q200 92 175 55
           Q185 95 170 120
           Q158 145 178 170
           Q160 150 152 118
           Q150 95 165 70
           Q145 105 152 145
           Q160 180 200 215Z"
        fill="url(#fpFlameRed)"/>
  <!-- Yellow flame center -->
  <path d="M240 215
           Q228 175 235 135
           Q244 95 232 60
           Q252 92 248 130
           Q260 100 270 80
           Q262 115 252 145
           Q248 175 260 215Z"
        fill="url(#fpFlameYellow)"/>
  <!-- Green flame right -->
  <path d="M268 215
           Q295 180 285 140
           Q278 100 305 65
           Q295 100 308 130
           Q322 100 330 80
           Q322 120 312 150
           Q302 180 310 215Z"
        fill="url(#fpFlameGreen)"/>

  <!-- ============ FLOATING INGREDIENTS ============ -->
  <!-- Yellow gourd / squash (top center-left) -->
  <g transform="translate(212, 70) rotate(-12)">
    <ellipse cx="0" cy="0" rx="18" ry="22" fill="#E8B940"/>
    <ellipse cx="-5" cy="-3" rx="6" ry="9" fill="#F4D070" opacity="0.6"/>
    <path d="M0 -22 Q3 -28 8 -30" fill="none" stroke="#6B5024" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Plantain / banana (left of gourd) -->
  <g transform="translate(170, 95) rotate(-30)">
    <path d="M-22 0 Q-18 -16 0 -20 Q18 -22 24 -10 Q22 -4 12 -2 Q-4 0 -22 4Z"
          fill="#E8C04A"/>
    <path d="M-22 0 Q-18 -16 0 -20 Q18 -22 24 -10"
          fill="none" stroke="#A8852A" stroke-width="1.4" opacity="0.55"/>
    <path d="M24 -10 Q28 -8 30 -4" fill="none" stroke="#5B4318" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Red chilli small (left) -->
  <g transform="translate(195, 130) rotate(20)">
    <path d="M0 0 Q-3 14 0 22 Q4 26 7 22 Q10 14 6 0 Z" fill="#C8401F"/>
    <path d="M0 0 Q-1 -4 -4 -6" fill="none" stroke="#3D7A47" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Red chilli larger (center) -->
  <g transform="translate(248, 110) rotate(-8)">
    <path d="M0 0 Q-5 18 -1 30 Q5 34 9 30 Q14 18 8 0 Z" fill="#D04621"/>
    <ellipse cx="3" cy="14" rx="3" ry="6" fill="#E66B3A" opacity="0.6"/>
    <path d="M0 0 Q1 -5 5 -8" fill="none" stroke="#3D7A47" stroke-width="2.2" stroke-linecap="round"/>
  </g>

  <!-- Cassava / yam log (right upper) -->
  <g transform="translate(296, 70) rotate(28)">
    <rect x="-12" y="-22" width="24" height="44" rx="6" fill="#9C7140"/>
    <rect x="-12" y="-22" width="24" height="9" rx="6" fill="#D9B585"/>
    <rect x="-12" y="13" width="24" height="9" rx="6" fill="#D9B585"/>
    <line x1="-10" y1="-2" x2="10" y2="-2" stroke="#6B4A22" stroke-width="0.8" opacity="0.55"/>
    <line x1="-10" y1="6" x2="10" y2="6" stroke="#6B4A22" stroke-width="0.8" opacity="0.55"/>
  </g>

  <!-- Cassava / yam log (right lower) -->
  <g transform="translate(312, 130) rotate(50)">
    <rect x="-10" y="-18" width="20" height="36" rx="5" fill="#8B6238"/>
    <rect x="-10" y="-18" width="20" height="7" rx="5" fill="#C9A479"/>
    <rect x="-10" y="11" width="20" height="7" rx="5" fill="#C9A479"/>
  </g>

  <!-- ============ POT ============ -->
  <!-- Rim (back) -->
  <ellipse cx="240" cy="220" rx="92" ry="20" fill="#6B3D1A"/>
  <!-- Rim (front, lighter) -->
  <ellipse cx="240" cy="216" rx="86" ry="16" fill="#B5793F"/>
  <ellipse cx="240" cy="214" rx="78" ry="11" fill="#7A4B28"/>

  <!-- Body -->
  <path d="M152 222
           Q142 280 158 308
           Q180 332 240 332
           Q300 332 322 308
           Q338 280 328 222Z"
        fill="url(#fpPotBody)"/>
  <!-- Body sheen -->
  <path d="M152 222 Q142 280 158 308 Q180 332 240 332 Q300 332 322 308 Q338 280 328 222Z"
        fill="url(#fpPotShine)"/>

  <!-- Decorative band -->
  <path d="M158 252 Q240 268 322 252 L322 282 Q240 298 158 282Z"
        fill="#8B5630" opacity="0.55"/>
  <!-- Kente diamonds on band -->
  <g fill="none" stroke="#F4D9B0" stroke-width="1.6" opacity="0.85">
    <path d="M178 268 L188 258 L198 268 L188 278Z"/>
    <path d="M205 269 L215 259 L225 269 L215 279Z"/>
    <path d="M232 270 L242 260 L252 270 L242 280Z"/>
    <path d="M259 269 L269 259 L279 269 L269 279Z"/>
    <path d="M286 268 L296 258 L306 268 L296 278Z"/>
    <line x1="193" y1="263" x2="200" y2="273"/><line x1="200" y1="263" x2="193" y2="273"/>
    <line x1="220" y1="263" x2="227" y2="273"/><line x1="227" y1="263" x2="220" y2="273"/>
    <line x1="247" y1="263" x2="254" y2="273"/><line x1="254" y1="263" x2="247" y2="273"/>
    <line x1="274" y1="263" x2="281" y2="273"/><line x1="281" y1="263" x2="274" y2="273"/>
  </g>

  <!-- Handles -->
  <path d="M152 232 Q126 232 124 252 Q122 274 150 268"
        fill="none" stroke="#7A4B28" stroke-width="16" stroke-linecap="round"/>
  <path d="M328 232 Q354 232 356 252 Q358 274 330 268"
        fill="none" stroke="#7A4B28" stroke-width="16" stroke-linecap="round"/>

  <!-- ============ CRADLING HANDS ============ -->
  <!-- Left hand -->
  <path d="M168 312
           Q150 318 145 332
           Q142 348 158 352
           Q175 354 192 348
           Q200 344 200 332
           Q198 320 188 314 Z"
        fill="#7A4B28"/>
  <!-- Left thumb -->
  <path d="M192 318 Q204 318 208 326 Q210 334 200 338"
        fill="#8B5630"/>
  <!-- Left finger lines -->
  <g fill="none" stroke="#5B3818" stroke-width="1.4" stroke-linecap="round" opacity="0.6">
    <path d="M158 332 Q156 342 162 348"/>
    <path d="M168 330 Q166 342 172 348"/>
    <path d="M178 328 Q176 340 182 346"/>
  </g>

  <!-- Right hand -->
  <path d="M312 312
           Q330 318 335 332
           Q338 348 322 352
           Q305 354 288 348
           Q280 344 280 332
           Q282 320 292 314 Z"
        fill="#7A4B28"/>
  <!-- Right thumb -->
  <path d="M288 318 Q276 318 272 326 Q270 334 280 338"
        fill="#8B5630"/>
  <!-- Right finger lines -->
  <g fill="none" stroke="#5B3818" stroke-width="1.4" stroke-linecap="round" opacity="0.6">
    <path d="M322 332 Q324 342 318 348"/>
    <path d="M312 330 Q314 342 308 348"/>
    <path d="M302 328 Q304 340 298 346"/>
  </g>

  <!-- ============ WORDMARK ============ -->
  <text x="240" y="392" text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900" font-size="54" letter-spacing="-2">
    <tspan fill="#E8520A">feast</tspan><tspan fill="#1C1C1A">pot</tspan>
  </text>

  <!-- Kente underline beneath the wordmark -->
  <g transform="translate(120, 404)" fill="none" stroke="#B5793F" stroke-width="1.4" opacity="0.55">
    <path d="M0 6 L7 0 L14 6 L7 12 Z
             M14 6 L21 0 L28 6 L21 12 Z
             M28 6 L35 0 L42 6 L35 12 Z
             M42 6 L49 0 L56 6 L49 12 Z
             M56 6 L63 0 L70 6 L63 12 Z
             M70 6 L77 0 L84 6 L77 12 Z
             M84 6 L91 0 L98 6 L91 12 Z
             M98 6 L105 0 L112 6 L105 12 Z
             M112 6 L119 0 L126 6 L119 12 Z
             M126 6 L133 0 L140 6 L133 12 Z
             M140 6 L147 0 L154 6 L147 12 Z
             M154 6 L161 0 L168 6 L161 12 Z
             M168 6 L175 0 L182 6 L175 12 Z
             M182 6 L189 0 L196 6 L189 12 Z
             M196 6 L203 0 L210 6 L203 12 Z
             M210 6 L217 0 L224 6 L217 12 Z
             M224 6 L231 0 L238 6 L231 12 Z"/>
  </g>
</svg>
