<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Feastpot">
  <title>Feastpot</title>

  <!-- Warm cream disc -->
  <circle cx="128" cy="128" r="124" fill="#FBF6EF"/>

  <!-- ===== Steam: Pan-African / Caribbean palette =====
       Deep red, gold and green, kept distinct from the brand-orange pot
       so the three wisps don't visually blend with the outline below. -->
  <!-- Red wisp (left) -->
  <path d="M104 116
           Q88 96 100 76
           Q116 56 100 36"
        fill="none" stroke="#C1272D" stroke-width="11" stroke-linecap="round"/>
  <!-- Gold wisp (center, taller) -->
  <path d="M132 116
           Q120 92 134 68
           Q150 44 130 22"
        fill="none" stroke="#FFC72C" stroke-width="11" stroke-linecap="round"/>
  <!-- Green wisp (right) -->
  <path d="M158 116
           Q174 96 162 76
           Q146 56 162 36"
        fill="none" stroke="#009A49" stroke-width="11" stroke-linecap="round"/>

  <!-- ===== Pot in brand orange, matching the "feast" wordmark ===== -->
  <g fill="none" stroke="#E8520A" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <!-- Lid knob (filled to read as a single piece with the lid stroke) -->
    <circle cx="128" cy="116" r="7" fill="#E8520A" stroke="none"/>
    <!-- Lid -->
    <path d="M62 134
             Q62 114 128 114
             Q194 114 194 134"/>
    <!-- Rim line under the lid -->
    <line x1="50" y1="138" x2="206" y2="138"/>
    <!-- Body -->
    <path d="M62 144
             L62 196
             Q62 224 90 224
             L166 224
             Q194 224 194 196
             L194 144"/>
    <!-- Side handles -->
    <path d="M50 154 Q32 158 36 170"/>
    <path d="M206 154 Q224 158 220 170"/>
  </g>
</svg>
