    <path d="M192 318 Q204 318 208 326 Q210 334 200 338" fill="#8B5630"/>
    <path d="M312 312 Q330 318 335 332 Q338 348 322 352 Q305 354 288 348 Q280 344 280 332 Q282 320 292 314Z" fill="#7A4B28"/>
