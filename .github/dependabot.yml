# Dependabot — keeps the monorepo's npm deps and CI actions current.
# Limit of 5 open PRs per ecosystem so the queue stays reviewable.

version: 2

updates:
  # ---- npm (root + workspaces) ----------------------------------------------
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    versioning-strategy: increase
    labels: [dependencies, npm]
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      # Group safe minor/patch bumps so we don't drown in PRs.
      minor-and-patch:
        update-types: [minor, patch]

  # ---- GitHub Actions used in workflows -------------------------------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels: [dependencies, github-actions]
    commit-message:
      prefix: chore(actions)
