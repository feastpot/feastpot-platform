name: Nightly smoke test

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC every night
  workflow_dispatch: {}   # allow manual trigger

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run vendor onboarding smoke
        run: npm run test --workspace=@feastpot/api -- vendor-onboarding-smoke
        env:
          NODE_ENV: test
          # Prisma datasource (this codebase reads SUPABASE_DB_URL, not DATABASE_URL).
          SUPABASE_DB_URL: ${{ secrets.TEST_SUPABASE_DB_URL }}
          SUPABASE_DIRECT_URL: ${{ secrets.TEST_SUPABASE_DIRECT_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Anon key is required by the test to sign the admin in via the
          # password grant - the service-role key cannot.
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
