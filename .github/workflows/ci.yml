# CI workflow — runs on every PR targeting `main` or `develop`.
#
# Each job is its own runner so they execute in parallel where possible. The
# `setup` job exists only to prime the npm + turbo caches that the other jobs
# share via `actions/cache`. Required status checks for branch protection:
# typecheck, lint, prisma-validate, test, build.

name: CI

on:
  pull_request:
    branches: [main, develop]

concurrency:
  # Cancel in-flight runs for the same PR when a new commit is pushed.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Force colour output and a stable Turbo cache location.
  FORCE_COLOR: 1
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  # ----------------------------------------------------------------------------
  # 1. Setup — install dependencies once and warm caches for downstream jobs.
  # ----------------------------------------------------------------------------
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install workspace dependencies
        # `npm ci` honours workspaces declared in the root package.json.
        run: npm ci

      - name: Cache Turbo build artefacts
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

  # ----------------------------------------------------------------------------
  # 2. Typecheck — every workspace must satisfy `tsc --noEmit`.
  # ----------------------------------------------------------------------------
  typecheck:
    name: Typecheck
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-
      - name: Generate Prisma client (needed for type-aware compiles)
        run: npm run db:generate
      - name: Run typecheck across all workspaces
        run: npx turbo run typecheck

  # ----------------------------------------------------------------------------
  # 3. Lint + Prettier
  # ----------------------------------------------------------------------------
  lint:
    name: Lint
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-
      - name: ESLint (turbo)
        run: npx turbo run lint
      - name: Prettier check
        run: npm run format:check

  # ----------------------------------------------------------------------------
  # 4. Prisma schema validation + format check
  # ----------------------------------------------------------------------------
  prisma-validate:
    name: Prisma validate
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validate schema
        run: npx prisma validate --schema=./prisma/schema.prisma
      - name: Schema is correctly formatted
        # `--check` exits non-zero when the file would be reformatted.
        run: npx prisma format --schema=./prisma/schema.prisma --check

  # ----------------------------------------------------------------------------
  # 5. Test — runs Jest/Vitest with coverage. Uses a Neon test branch URL
  #    provided via secrets so integration tests can hit a real Postgres.
  # ----------------------------------------------------------------------------
  test:
    name: Test (coverage ≥ 70%)
    needs: [setup]
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      DIRECT_URL: ${{ secrets.TEST_DIRECT_URL }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-
      - name: Generate Prisma client
        run: npm run db:generate
      - name: Apply migrations to test DB
        run: npx prisma migrate deploy --schema=./prisma/schema.prisma
      - name: Run tests with coverage
        # `--` passes flags through Turbo to each workspace's test runner.
        # Coverage thresholds (≥70 %) should be enforced inside each workspace's
        # jest.config / vitest.config — failure there fails this job.
        run: npx turbo run test -- --coverage --ci
      - name: Upload coverage to Codecov (optional)
        if: always()
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ----------------------------------------------------------------------------
  # 6. Build — only after every quality gate has passed.
  # ----------------------------------------------------------------------------
  build:
    name: Build all apps
    needs: [typecheck, lint, prisma-validate, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-
      - name: Generate Prisma client
        run: npm run db:generate
      - name: Build (api, web, vendor, admin)
        run: npx turbo run build
