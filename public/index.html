<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Node.js App</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 640px; margin: 4rem auto; padding: 0 1rem; }
      button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
      pre { background: #f4f4f4; padding: 1rem; border-radius: 6px; }
    </style>
  </head>
  <body>
    <h1>Node.js + Express</h1>
    <p>Your Node.js app is running on Replit.</p>
    <button id="btn">Call /api/hello</button>
    <pre id="out">(click the button)</pre>
    <script>
      document.getElementById("btn").addEventListener("click", async () => {
        const res = await fetch("/api/hello");
        const data = await res.json();
        document.getElementById("out").textContent = JSON.stringify(data, null, 2);
      });
    </script>
  </body>
</html>
